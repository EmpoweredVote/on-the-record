services:
  - type: static
    name: on-the-record-web
    rootDir: web
    buildCommand: npm install && rm -rf .next/cache && npm run build
    staticPublishPath: out
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: EV_ACCOUNTS_URL
        sync: false
      - key: NEXT_PUBLIC_EV_ACCOUNTS_URL
        sync: false
    routes:
      - type: rewrite
        source: /meetings/*
        destination: /meetings/view/index.html
      - type: rewrite
        source: /people/*
        destination: /people/view/index.html
      - type: rewrite
        source: /topics/*
        destination: /topics/view/index.html
