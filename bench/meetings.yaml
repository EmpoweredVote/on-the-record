# Diarization benchmark test set.
#
# Each entry is either:
#   - a `permalink` to a specific CATS TV meeting page (locked-in fixture), or
#   - `latest: bloomington_city_council` (auto-resolved to the most recent
#     Bloomington City Council meeting at run time)
#
# `expected_speakers` is your best estimate of distinct human voices in the
# meeting. Used by the scorer to flag over-fragmentation (too many labels) or
# under-segmentation (too few). Doesn't need to be exact — order-of-magnitude
# is fine. Update after the first run if reality differs.

meetings:
  - id: 2026-02-04-council
    permalink: https://catstv.net/m.php?q=15482
    description: "Bloomington City Council — Feb 4, 2026"
    expected_speakers: 12  # 9 councilors + clerk + mayor + a few public commenters

  - id: 2026-02-18-council
    permalink: https://catstv.net/m.php?q=15529
    description: "Bloomington City Council — Feb 18, 2026"
    expected_speakers: 12

  - id: 2026-02-25-council
    permalink: https://catstv.net/m.php?q=15556
    description: "Bloomington City Council — Feb 25, 2026"
    expected_speakers: 12

  - id: latest-council
    latest: bloomington_city_council
    description: "Most recent Bloomington City Council regular session (resolved at run time)"
    expected_speakers: 12
    # Note: filters to m4v matching ^B_CC_\d{6}\.m4v$ — i.e. excludes fiscal
    # committee, committee-on-courts, deliberation sessions, etc.

# Models to benchmark. Each name maps to a Modal function in modal_app.py.
#
# `nemo_sortformer` is commented out — the published `diar_sortformer_4spk-v1`
# model OOMs on L4 (22GB VRAM) for any meeting longer than ~30 min. Even the
# 31-min Feb 25 special session asked for 32GB. Sortformer-as-distributed is
# a short-clip model; running it on 2-3hr meetings needs either an A100-80GB
# or a chunked-inference wrapper. Re-enable only after one of those is
# implemented. See bench/snapshots/2026-05-14-baseline/ for prior failures.
models:
  - pyannote_oss
  - pyannote_merged
  - pyannote_ai
  - vibevoice
  # - nemo_sortformer  # OOM on L4 for long meetings; see note above

# Optional hand-labeled evaluation fields can be added to any meeting:
#
#   reference_rttm: references/<clip-name>/reference.rttm
#   uem: references/<clip-name>/region.uem
#
# RTTM timestamps stay relative to the full meeting. The UEM limits DER to
# the labeled interval. See bench/references/README.md.
